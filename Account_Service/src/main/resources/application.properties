# ==========================================================
# 🚀 CORE SETTINGS
# ==========================================================
spring.application.name=BANK-ACCOUNT-SERVICE
server.port=8086

# ==========================================================
# 🗄️ DATABASE (MySQL)
# ==========================================================
spring.datasource.url=jdbc:mysql://localhost:3306/account_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================================
# 🛰️ EUREKA SERVICE DISCOVERY
# ==========================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# ==========================================================
# 📘 SWAGGER / OPENAPI
# ==========================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ==========================================================
# 🛡️ GATEWAY SUPPORT
# ==========================================================
server.forward-headers-strategy=framework

# ==========================================================
# 🔗 FEIGN CLIENT
# ==========================================================
spring.cloud.openfeign.enabled=true
feign.client.config.default.loggerLevel=full

# ==========================================================
# 📊 LOGGING (SONAR SAFE + FILE APPENDER)
# ==========================================================
logging.level.root=INFO
logging.level.com.bank.account=DEBUG

logging.file.name=logs/account-service.log

logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ==========================================================
# ❤️ ACTUATOR (MICROSERVICE HEALTH CHECK)
# ==========================================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ==========================================================
# 🧠 SONAR (FOR CI PIPELINE ONLY)
# ==========================================================
sonar.projectKey=account-service
sonar.projectName=Account Service
sonar.sourceEncoding=UTF-8
