# ==============================================================
# 🚀 CORE CONFIG
# ==============================================================
spring.application.name=BANK-AUTH-SERVICE
server.port=8081

# ==============================================================
# 🗄️ DATABASE CONFIG (MySQL)
# ==============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/bank_auth_db
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================================================
# 🛰️ EUREKA CLIENT CONFIG
# ==============================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ==============================================================
# 📘 SPRINGDOC / SWAGGER CONFIG
# ==============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# IMPORTANT (fixes gateway + forwarded calls)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ==============================================================
# 🌐 GATEWAY / FORWARD HEADERS SUPPORT
# ==============================================================
server.forward-headers-strategy=framework

# ==============================================================
# 🧪 OPTIONAL DEBUG (REMOVE IN PRODUCTION LATER)
# ==============================================================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.cloud.netflix.eureka=DEBUG



jwt.secret=bank_auth_service_super_secure_secret_key_2026_bank_secure
jwt.expiration=86400000