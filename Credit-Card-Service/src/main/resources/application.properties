# ==============================================================
# 🚀 CORE SETTINGS
# ==============================================================
spring.application.name=CREDIT-CARD-SERVICE
server.port=8085

# ==============================================================
# 🗄️ DATABASE (MySQL)
# ==============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/credit_card_db
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==============================================================
# 🛰️ SERVICE DISCOVERY (EUREKA)
# ==============================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# ==============================================================
# 📘 SWAGGER / OPENAPI
# ==============================================================
# This path is what the Gateway calls to aggregate documentation
springdoc.api-docs.path=/v3/api-docs

# ==============================================================
# 🛡️ SECURITY & HEADERS
# ==============================================================
# Required to handle X-Forwarded headers from Gateway
server.forward-headers-strategy=framework

# ==========================================================
# 📊 LOGGING (SONAR SAFE + FILE APPENDER)
# ==========================================================
logging.level.root=INFO
logging.level.com.bank.card=DEBUG
logging.level.org.springframework.web=INFO

# Log file location
logging.file.name=logs/credit-card-service.log

# Log patterns
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n


# ==========================================================
# ❤️ ACTUATOR (MICROSERVICE HEALTH CHECK)
# ==========================================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always


# ==========================================================
# 🧠 SONAR (FOR CI PIPELINE ONLY)
# ==========================================================
sonar.projectKey=credit-card-service
sonar.projectName=Credit Card Service
sonar.sourceEncoding=UTF-8



