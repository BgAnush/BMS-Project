# ==============================================================  
# 🚀 CORE GATEWAY SETTINGS  
# ==============================================================  
spring.application.name=API-GATEWAY
server.port=8080
server.forward-headers-strategy=framework

# ==============================================================  
# 🛰️ EUREKA SERVICE DISCOVERY  
# ==============================================================  
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
spring.cloud.gateway.discovery.locator.enabled=true

# ==============================================================  
# 🛣️ GATEWAY ROUTES  
# ==============================================================  

# AUTH SERVICE
spring.cloud.gateway.routes[0].id=AUTH-SERVICE
spring.cloud.gateway.routes[0].uri=lb://BANK-AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# USER SERVICE
spring.cloud.gateway.routes[1].id=USER-SERVICE
spring.cloud.gateway.routes[1].uri=lb://BANK-USER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/users/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# ACCOUNT SERVICE
spring.cloud.gateway.routes[2].id=ACCOUNT-SERVICE
spring.cloud.gateway.routes[2].uri=lb://BANK-ACCOUNT-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/accounts/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# TRANSACTION SERVICE
spring.cloud.gateway.routes[3].id=TRANSACTION-SERVICE
spring.cloud.gateway.routes[3].uri=lb://BANK-TRANSACTION-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/transactions/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

# CREDIT CARD SERVICE
spring.cloud.gateway.routes[4].id=CREDIT-CARD-SERVICE
spring.cloud.gateway.routes[4].uri=lb://CREDIT-CARD-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/credit-card/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1


# CREDIT CARD SERVICE
spring.cloud.gateway.routes[5].id=Loan-Service
spring.cloud.gateway.routes[5].uri=lb://LOAN-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/loan/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=1

# IMAGE ROUTE (New)
spring.cloud.gateway.routes[6].id=IMAGE-SERVICE
spring.cloud.gateway.routes[6].uri=lb://BANK-AUTH-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/uploads/**
# Note: DO NOT add StripPrefix here
# ==============================================================  
# 📘 SWAGGER AGGREGATION  
# ==============================================================  

springdoc.swagger-ui.urls[0].name=AUTH-SERVICE
springdoc.swagger-ui.urls[0].url=/auth/v3/api-docs

springdoc.swagger-ui.urls[1].name=USER-SERVICE
springdoc.swagger-ui.urls[1].url=/users/v3/api-docs

springdoc.swagger-ui.urls[2].name=ACCOUNT-SERVICE
springdoc.swagger-ui.urls[2].url=/accounts/v3/api-docs

springdoc.swagger-ui.urls[3].name=TRANSACTION-SERVICE
springdoc.swagger-ui.urls[3].url=/transactions/v3/api-docs

springdoc.swagger-ui.urls[4].name=CREDIT-CARD-SERVICE
springdoc.swagger-ui.urls[4].url=/credit-card/v3/api-docs

springdoc.swagger-ui.urls[5].name=LOAN-SERVICE
springdoc.swagger-ui.urls[5].url=/loan/v3/api-docs

# ==============================================================  
# 🛡️ GLOBAL CORS CONFIG (FIXED - IMPORTANT)  
# ==============================================================  

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposedHeaders=Authorization
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true


jwt.secret=bank_auth_service_super_secure_secret_key_2026_bank_secure
