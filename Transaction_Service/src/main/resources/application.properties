# ==============================================================
# 🚀 CORE SETTINGS
# ==============================================================
spring.application.name=BANK-TRANSACTION-SERVICE
server.port=8084

# ==============================================================
# 🗄️ DATABASE (MySQL)
# ==============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/transaction_db
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==============================================================
# 🛰️ SERVICE DISCOVERY (EUREKA)
# ==============================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# ==============================================================
# 📘 SWAGGER / OPENAPI
# ==============================================================
springdoc.api-docs.path=/v3/api-docs

# ==============================================================
# 🛡️ SECURITY & HEADERS
# ==============================================================
server.forward-headers-strategy=framework

# ==============================================================
# 🔗 FEIGN CLIENT SETTINGS (If using for balance checks)
# ==============================================================
# Optional: Helps with debugging inter-service communication
logging.level.com.bank.transaction.feign=DEBUG

# ===============================
# LOG FILE CONFIG (PRODUCTION)
# ===============================

logging.level.root=INFO
logging.level.com.bank.transaction=DEBUG

# Main log file
logging.file.name=logs/transaction-service.log

# Optional: size-based rotation support (via logback default behavior)
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=10

# Console format
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger - %msg%n

# File format
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger - %msg%n
